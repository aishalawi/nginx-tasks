# Round Robin — default, requests rotate evenly across backends
upstream backend_rr {
    server 127.0.0.1:8080;
    server 127.0.0.1:8081;
    server 127.0.0.1:8082;
}
 
# Least Connections — sends to backend with fewest active connections
upstream backend_lc {
    least_conn;
    server 127.0.0.1:8080;
    server 127.0.0.1:8081;
    server 127.0.0.1:8082;
}
 
# IP Hash — same client always hits the same backend
upstream backend_ip {
    ip_hash;
    server 127.0.0.1:8080;
    server 127.0.0.1:8081;
    server 127.0.0.1:8082;
}
